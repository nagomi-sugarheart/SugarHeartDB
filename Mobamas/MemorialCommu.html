<!--
============================================================
YouTube IFrame API — 汎用シークプレイヤー
============================================================
動画IDと再生秒数はすべてHTMLのdata属性から取得します。

HTML側で設定が必要な値:
  #mc-player-wrap[data-video-id] → YouTube動画ID
  .mc-seek-btn[data-time]        → 各コミュの開始秒数

このscriptタグ内は変更不要です。
============================================================
-->
<script>
(function () {
    const wrap = document.getElementById('mc-player-wrap');
    const videoId = wrap ? wrap.dataset.videoId : '';

    /* YouTube IFrame API スクリプトを動的に読み込む */
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    let player = null;

    /* API 準備完了時にプレイヤーを初期化 */
    window.onYouTubeIframeAPIReady = function () {
        if (!videoId || videoId === 'XXXXXXXXXXX') return; /* 動画ID未設定時はスキップ */
        player = new YT.Player('mc-yt-player', {
            videoId: videoId,
            playerVars: {
                rel: 0,
                modestbranding: 1,
                playsinline: 1
            }
        });
    };

    /* 各シークボタンにクリックイベントを設定 */
    document.querySelectorAll('.mc-seek-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
            const seconds = parseInt(btn.dataset.time, 10);
            if (!player || typeof player.seekTo !== 'function') return;
            player.seekTo(seconds, true);
            player.playVideo();
            /* プレイヤーが画面外の場合はスクロールして見せる */
            wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });
}());
</script>
