<section class="page-hero">

<div class="ud-page">

  <div class="ud-hero">
    <div class="ud-hero-left">
      <div class="badges">
        <span class="unit-badge size">－人ユニット</span>
        <span class="unit-badge year">－〜</span>
        <span class="unit-badge theme">モバマス</span>
      </div>
      <h1>カワスウィーティなボクはぁと</h1>
      <div class="en">KawaSweetieNaBokuHeart · DEBUT －</div>
      <p class="summary">－</p>
    </div>
    <div class="ud-hero-right">
      <div class="members-label">MEMBERS</div>
      <div class="members-row">
        <div class="member shin"><div class="av">心</div><div class="name">佐藤心</div></div>
      </div>
      <div class="ud-stats-strip">
        <div class="stat"><div class="v">1</div><div class="l">APPEARANCES</div></div>
        <div class="stat"><div class="v">－</div><div class="l">SONGS</div></div>
        <div class="stat"><div class="v">－</div><div class="l">ALBUMS</div></div>
        <div class="stat"><div class="v">－</div><div class="l">DURATION</div></div>
      </div>
    </div>
  </div>

  <article class="ud-appearance">
    <header class="ud-appearance-header">
      <div class="ud-ap-date">
        <div class="y">－</div>
        <div class="m">－</div>
        <div class="d">－</div>
      </div>
      <div class="ud-ap-title">
        <h3>－</h3>
        <div class="game-event"><span>モバマス</span></div>
      </div>
      <div class="ud-ap-meta"><span class="num">No.01</span></div>

    <div class="ud-phases">
      <div class="ud-phase" data-phase="debut">
        <div class="ud-phase-label">DEBUT<span class="ic">登場</span></div>
        <div class="ud-phase-img"><img src="Unit/KawaSweetieNaBokuHeart/App.png" alt="登場" loading="lazy"></div>
        <div class="ud-dialogue">－</div>
      </div>
      <div class="ud-phase" data-phase="battle">
        <div class="ud-phase-label">BATTLE<span class="ic">対戦</span></div>
        <div class="ud-phase-img"><img src="Unit/KawaSweetieNaBokuHeart/Battle.jpg" alt="対戦" loading="lazy"></div>
        <div class="ud-dialogue">－</div>
      </div>
      <div class="ud-phase" data-phase="win">
        <div class="ud-phase-label">WIN<span class="ic">勝利</span></div>
        <div class="ud-phase-img"><img src="Unit/KawaSweetieNaBokuHeart/Win.png" alt="勝利" loading="lazy"></div>
        <div class="ud-dialogue">－</div>
      </div>
      <div class="ud-phase" data-phase="lose">
        <div class="ud-phase-label">LOSE<span class="ic">敗北</span></div>
        <div class="ud-phase-img"><img src="Unit/KawaSweetieNaBokuHeart/Lose.png" alt="敗北" loading="lazy"></div>
        <div class="ud-dialogue">－</div>
      </div>
      <div class="ud-phase" data-phase="draw">
        <div class="ud-phase-label">DRAW<span class="ic">引分</span></div>
        <div class="ud-phase-img"><img src="Unit/KawaSweetieNaBokuHeart/Draw.png" alt="引分" loading="lazy"></div>
        <div class="ud-dialogue">－</div>
      </div>
    </div>
    <footer class="ud-ap-foot">
      <div class="related"><span class="lbl">RELATED //</span></div>
    </footer>
