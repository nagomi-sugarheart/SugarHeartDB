];
CARDS.forEach(function(c, i) {
    c._idx = i;
    c._dateNum = c.date ? parseInt(c.date.replace(/\./g, ''), 10) : 0;
});

var currentTab = 'all';
var currentRarity = '';
var currentSort = 'newest';
var currentSearch = '';

function rarityGroupOf(r) {
    if (r === 'ssr' || r === 'ssr-plus') return 'ssr';
    if (r === 'sr' || r === 'sr-plus') return 'sr';
    return 'r';
}

function render() {
    var q = currentSearch.replace(/\s+/g, '').toLowerCase();
    var filtered = CARDS.filter(function(c) {
        if (currentTab !== 'all' && c.game !== currentTab) return false;
        if (currentRarity && rarityGroupOf(c.rarity) !== currentRarity) return false;
        if (q && c.name.toLowerCase().replace(/\s+/g, '').indexOf(q) === -1) return false;
        return true;
    });

    var sorted = filtered.slice();
    if (currentSort === 'newest') {
        sorted.sort(function(a, b) {
            var d = b._dateNum - a._dateNum;
            return d !== 0 ? d : b._idx - a._idx;
        });
    } else if (currentSort === 'oldest') {
        sorted.sort(function(a, b) {
            var d = a._dateNum - b._dateNum;
            return d !== 0 ? d : a._idx - b._idx;
        });
    } else if (currentSort === 'rarity') {
        sorted.sort(function(a, b) { return b.rarityOrd - a.rarityOrd; });
    }

    document.getElementById('cl-count').textContent = sorted.length;

    var list = document.getElementById('cl-list');
    list.innerHTML = '';

    if (sorted.length === 0) {
        list.innerHTML = '<p class="cl-no-results">該当するカードが見つかりませんでした。</p>';
        return;
    }

    var gameName = {mobamas: 'モバマス', deresute: 'デレステ'};
    sorted.forEach(function(c) {
        var art = document.createElement('article');
        art.className = 'card-row rarity-' + c.rarity;
        art.innerHTML =
            '<div class="card-icon"><a href="' + c.link + '"><img src="' + c.icon + '" alt="' + c.name + '" loading="lazy"></a></div>' +
            '<div class="card-badges"><span class="r-pill">' + c.rarityLabel + '</span><span class="game-tag game-tag-' + c.game + '">' + gameName[c.game] + '</span></div>' +
            '<div class="card-name"><h3><a href="' + c.link + '">' + c.name + '</a></h3></div>' +
            '<div class="card-action"><a href="' + c.link + '">詳細 →</a></div>';
        list.appendChild(art);
    });
}

/* Tab switching */
document.querySelectorAll('#cl-tab-nav .tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        currentTab = btn.dataset.tab;
        document.querySelectorAll('#cl-tab-nav .tab-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        /* Update URL hash without scrolling */
        if (history.replaceState) {
            history.replaceState(null, '', currentTab === 'all' ? '#' : '#' + currentTab);
        }
        render();
    });
});

/* Rarity filter chips */
document.querySelectorAll('#cl-rarity-filters .filter-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
        currentRarity = chip.dataset.rarity;
        document.querySelectorAll('#cl-rarity-filters .filter-chip').forEach(function(c) { c.classList.remove('active'); });
        chip.classList.add('active');
        render();
    });
});

/* Sort */
document.getElementById('cl-sort').addEventListener('change', function() {
    currentSort = this.value;
    render();
});

/* Search */
document.getElementById('cl-search').addEventListener('input', function() {
    currentSearch = this.value;
    render();
});

/* Activate tab from URL hash */
(function() {
    var hash = location.hash.replace('#', '');
    if (hash === 'mobamas' || hash === 'deresute') {
        currentTab = hash;
        document.querySelectorAll('#cl-tab-nav .tab-btn').forEach(function(b) { b.classList.remove('active'); });
        var target = document.querySelector('#cl-tab-nav .tab-btn[data-tab="' + hash + '"]');
        if (target) target.classList.add('active');
    }
    render();
})();
</script>
