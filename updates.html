<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
	<base href="/SugarHeartDB/">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新情報｜SugarHeartDB</title>
    <meta name="description" content="SugarHeartDBの更新情報一覧。佐藤心（しゅがーはぁと）ファンサイトの最新更新履歴。">
    <meta name="author" content="なごみ（@nagomi_IMCG）">
    <meta property="og:type" content="article">
    <meta property="og:title" content="更新情報｜SugarHeartDB">
    <meta property="og:description" content="SugarHeartDBの更新情報一覧">
    <meta property="og:site_name" content="SugarHeartDB">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="更新情報｜SugarHeartDB">
    <link rel="icon" type="image/png" sizes="32x32" href="Favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="Favicon/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script src="components/header.js"></script>

<section class="page-hero">
    <div class="breadcrumb"><a href="/SugarHeartDB/">HOME</a> · <strong>UPDATES</strong></div>
    <h1>更新情報 <span class="sub">/ UPDATE LOG</span></h1>
    <p class="summary">SugarHeartDBの更新履歴です。新規ページの追加や情報の修正などを記録しています。</p>
</section>

<div class="page">
    <section class="news">
        <div id="updates-list">
            <p style="color:var(--sh-text-mute); padding:15px 0; font-size:14px;">読み込み中…</p>
        </div>
    </section>
</div>

<script>
fetch('data/updates.json')
    .then(function(r) { return r.json(); })
    .then(function(updates) {
        var container = document.getElementById('updates-list');
        container.innerHTML = '';
        updates.forEach(function(u) {
            var parts = u.date.split('.');
            var year = parts[0] + '.' + parts[1];
            var day  = parts[2] || '';
            var row = document.createElement('div');
            row.className = 'news-row';
            var dt = document.createElement('div');
            dt.className = 'news-date';
            dt.innerHTML = '<span class="y">' + year + '</span><span class="d">' + day + '</span>';
            var tx = document.createElement('div');
            tx.className = 'news-text';
            tx.innerHTML = u.text;
            row.appendChild(dt);
            row.appendChild(tx);
            container.appendChild(row);
        });
    })
    .catch(function() {
        var container = document.getElementById('updates-list');
        container.innerHTML = '<p style="color:var(--sh-text-mute); padding:15px 0; font-size:14px;">更新情報を読み込めませんでした。</p>';
    });
</script>

</body>
</html>
