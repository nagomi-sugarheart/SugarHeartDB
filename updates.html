<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新情報｜SugarHeartDB</title>
    <meta name="description" content="SugarHeartDBの更新情報一覧。佐藤心（しゅがーはぁと）ファンサイトの最新更新履歴。">
    <meta name="author" content="なごみ（@nagomi_IMCG）">
    <meta property="og:type" content="article">
    <meta property="og:title" content="更新情報｜SugarHeartDB">
    <meta property="og:description" content="SugarHeartDBの更新情報一覧">
    <meta property="og:site_name" content="SugarHeartDB">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="更新情報｜SugarHeartDB">
    <link rel="icon" type="image/png" sizes="32x32" href="/Favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/Favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/Favicon/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap" rel="stylesheet">
</head>
<body>
<script src="/components/header.js"></script>

<div class="sub-title">
    <h1>＊更新情報</h1>
</div>

<div class="box-area updates-list" id="updates-list">
    <p class="update-text" style="color:#ccc;">読み込み中…</p>
</div>

<div class="box-area" style="text-align:center;">
    <a href="/" style="color:#fd89b9; text-decoration:underline; font-weight:bold;">▶ トップページへ戻る</a>
</div>

<script>

// 更新情報：data/updates.json から全件を取得して表示
fetch('/data/updates.json')
    .then(function(r) { return r.json(); })
    .then(function(updates) {
        var container = document.getElementById('updates-list');
        container.innerHTML = '';
        updates.forEach(function(u) {
            var item = document.createElement('div');
            item.className = 'update-item';
            var dt = document.createElement('div');
            dt.className = 'update-date';
            dt.textContent = u.date;
            var tx = document.createElement('p');
            tx.className = 'update-text';
            tx.innerHTML = u.text;
            item.appendChild(dt);
            item.appendChild(tx);
            container.appendChild(item);
        });
    })
    .catch(function() {
        var container = document.getElementById('updates-list');
        container.innerHTML = '<p class="update-text" style="color:#ccc;">更新情報を読み込めませんでした。</p>';
    });
</script>

</body>
</html>
